<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Practices Radar</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 3rem 2.5rem;
            flex: 1;
            width: 100%;
            overflow: hidden;
        }
        .logo {
            text-align: center;
            margin-bottom: 2rem;
        }
        .logo-img {
            height: 80px;
            max-width: 100%;
            width: auto;
            object-fit: contain;
        }
        h1 {
            font-family: 'Playfair Display', Georgia, serif;
            text-align: center;
            font-size: 2rem;
            font-weight: 400;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            margin-bottom: 0.4rem;
            color: var(--heading);
        }
        .subtitle {
            text-align: center;
            font-size: 0.85rem;
            color: var(--muted);
            margin-bottom: 0.5rem;
            font-weight: 300;
            letter-spacing: 0.04em;
        }
        .generated-at {
            text-align: center;
            font-size: 0.75rem;
            color: var(--muted);
            margin-bottom: 1.5rem;
            font-weight: 300;
            letter-spacing: 0.03em;
        }
        .divider {
            width: 60px;
            height: 2px;
            background: var(--accent);
            margin: 0 auto 2.5rem auto;
        }

        /* Section titles */
        .section-title {
            font-family: 'Inter', sans-serif;
            font-size: 0.8rem;
            font-weight: 500;
            padding: 0.5rem 1rem;
            background: var(--surface);
            border-left: 2px solid var(--accent);
            letter-spacing: 0.06em;
            text-transform: uppercase;
            color: var(--text);
            flex-shrink: 0;
        }
        h2.section-heading {
            font-family: 'Playfair Display', Georgia, serif;
            font-size: 1.15rem;
            font-weight: 400;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            margin: 3rem 0 1.2rem 0;
            padding-bottom: 0.6rem;
            border-bottom: 1px solid var(--border);
            color: var(--heading);
        }

        /* Tables */
        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 1rem;
            table-layout: fixed;
        }
        th {
            background: var(--surface);
            padding: 0.6rem 0.4rem;
            font-size: 0.65rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            text-align: center;
            border: 1px solid var(--border);
            color: #6B5B52;
        }
        th:first-child {
            text-align: left;
            width: 320px;
            padding-left: 1rem;
        }
        td {
            padding: 0.5rem 0.4rem;
            font-size: 0.8rem;
            text-align: center;
            border: 1px solid var(--border);
            font-weight: 500;
        }
        td:first-child {
            text-align: left;
            padding-left: 1rem;
            font-weight: 400;
            background: var(--bg);
            color: var(--text);
        }

        /* Stats */
        .stats {
            display: flex;
            justify-content: center;
            gap: 1.5rem;
            margin: 0 0 1rem 0;
            flex-wrap: wrap;
        }
        .stat-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            padding: 1.2rem 1.8rem;
            text-align: center;
            min-width: 130px;
        }
        .stat-value {
            font-family: 'Playfair Display', Georgia, serif;
            font-size: 1.8rem;
            font-weight: 600;
        }
        .stat-label {
            font-size: 0.7rem;
            color: var(--muted);
            margin-top: 0.3rem;
            text-transform: uppercase;
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
        }
        .info-icon {
            position: relative;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            border: 1px solid var(--muted);
            font-size: 0.5rem;
            font-weight: 600;
            cursor: help;
            text-transform: none;
            transition: border-color 0.2s, color 0.2s;
        }
        .info-icon:hover {
            border-color: var(--accent);
            color: var(--accent);
        }
        .info-icon .info-tooltip {
            display: none;
            position: absolute;
            bottom: calc(100% + 8px);
            right: -10px;
            background: var(--heading);
            color: var(--bg);
            padding: 6px 10px;
            border-radius: 4px;
            font-size: 0.65rem;
            font-weight: 400;
            white-space: normal;
            width: 200px;
            text-align: center;
            text-transform: none;
            letter-spacing: 0;
            z-index: 10;
        }
        .info-icon .info-tooltip::after {
            content: '';
            position: absolute;
            top: 100%;
            right: 12px;
            border: 5px solid transparent;
            border-top-color: var(--heading);
        }
        .info-icon:hover .info-tooltip {
            display: block;
            letter-spacing: 0.06em;
            font-weight: 400;
        }

        /* Team summary */
        .team-summary {
            margin-top: 0.8rem;
        }
        .team-bar-container {
            display: flex;
            align-items: center;
            margin-bottom: 0.6rem;
            gap: 1rem;
        }
        .team-bar-label {
            width: 120px;
            font-size: 0.75rem;
            text-align: right;
            flex-shrink: 0;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #6B5B52;
        }
        .team-bar-track {
            flex: 1;
            height: 22px;
            display: flex;
            overflow: hidden;
            border: 1px solid var(--border);
        }
        .team-bar-segment {
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.65rem;
            font-weight: 500;
            letter-spacing: 0.02em;
            min-width: 22px;
            overflow: visible;
        }

        /* Layer section with inline bar */
        .layer-header {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin: 0.6rem 0;
        }
        .layer-header .section-title {
            margin: 0;
            width: 200px;
            min-width: 200px;
            white-space: nowrap;
        }
        .layer-bar {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            flex: 1;
        }

        /* Collapsible details */
        details {
            margin-bottom: 0.3rem;
        }
        details summary {
            cursor: pointer;
            list-style: none;
        }
        details summary::-webkit-details-marker {
            display: none;
        }
        details summary .layer-header .section-title::before {
            content: '+ ';
            font-size: 0.75rem;
            color: var(--accent);
            font-weight: 600;
        }
        details[open] summary .layer-header .section-title::before {
            content: '- ';
            color: var(--accent);
        }
        details .table-container {
            margin-top: 0.8rem;
            padding-left: 0;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }

        /* Radar */
        .radar-wrap {
            margin: 1.5rem 0;
            text-align: center;
        }
        .radar-wrap svg {
            font-family: 'Inter', -apple-system, sans-serif;
        }
        .radar-legend-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.2rem;
            margin-top: 1rem;
            padding: 0 0.5rem;
        }
        .radar-legend-col h4 {
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            margin: 0 0 0.4rem 0;
            padding-bottom: 0.25rem;
            border-bottom: 2px solid currentColor;
        }
        .radar-legend-col ul {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        .radar-legend-col li {
            font-size: 0.65rem;
            line-height: 1.5;
            color: var(--text);
            display: flex;
            align-items: baseline;
            gap: 0.3rem;
        }
        .radar-legend-col li .dot-num {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 16px;
            height: 16px;
            min-width: 16px;
            border-radius: 50%;
            font-size: 0.5rem;
            font-weight: 600;
            color: #fff;
            flex-shrink: 0;
        }
        .radar-legend-col .ring-label {
            font-size: 0.6rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            margin-top: 0.4rem;
            margin-bottom: 0.15rem;
        }

        /* Hover */
        tr:hover td:not(:first-child) {
            opacity: 0.85;
        }
        details summary:hover .section-title {
            border-left-color: var(--accent-hover);
            color: var(--heading);
        }

        /* Footer */
        .radar-footer {
            border-top: 1px solid var(--border);
            padding: 1.5rem 2.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.75rem;
            color: var(--muted);
        }
        .radar-footer a {
            color: var(--muted);
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
        }
        .radar-footer a:hover {
            color: var(--text);
        }
        .radar-footer .footer-right {
            display: flex;
            align-items: center;
            gap: 0.6rem;
        }
        .radar-footer .footer-right svg {
            height: 20px;
            width: auto;
        }
        .radar-footer .github-link svg {
            height: 16px;
            width: 16px;
        }
        .radar-footer .github-link {
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            font-size: 0.7rem;
        }
        /* Mobile */
        @media (max-width: 768px) {
            .container {
                padding: 1.5rem 1rem;
            }
            h1 {
                font-size: 1.4rem;
                letter-spacing: 0.08em;
            }
            .subtitle {
                font-size: 0.78rem;
                margin-bottom: 1.5rem;
            }
            .stats {
                gap: 0.8rem;
            }
            .stat-card {
                padding: 0.8rem 1.2rem;
                min-width: 100px;
            }
            .stat-value {
                font-size: 1.4rem;
            }
            table {
                table-layout: auto;
                min-width: 600px;
            }
            th:first-child {
                width: 180px;
            }
            th {
                font-size: 0.6rem;
                padding: 0.5rem 0.3rem;
            }
            td {
                font-size: 0.7rem;
                padding: 0.4rem 0.3rem;
            }
            .team-bar-label {
                width: 80px;
                font-size: 0.65rem;
            }
            .layer-header .section-title {
                width: auto;
                min-width: auto;
                font-size: 0.72rem;
            }
            .layer-header {
                gap: 0.5rem;
            }
            .layer-bar {
                gap: 0.4rem;
            }
            .radar-footer {
                flex-direction: column;
                gap: 0.8rem;
                padding: 1rem;
                text-align: center;
            }
            .radar-legend-grid {
                grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
                gap: 0.8rem;
            }
        }
    </style>
</head>
<body>

<div class="container">

<div class="logo" id="logo-container"></div>

<h1 id="main-title"></h1>
<p class="subtitle" id="main-subtitle"></p>
<p class="generated-at" id="generated-at"></p>
<div class="divider"></div>

<div class="stats" id="stats"></div>

<h2 class="section-heading">Team Radars</h2>
<div id="team-radars"></div>

<h2 class="section-heading">Practices by Layer</h2>
<div id="layers"></div>


<script>
const DATA = /** @DATA@ */;

// Apply theme as CSS variables
(function applyTheme() {
    const t = DATA.theme;
    const root = document.documentElement.style;
    root.setProperty('--bg', t.background);
    root.setProperty('--text', t.text);
    root.setProperty('--heading', t.heading);
    root.setProperty('--accent', t.accent);
    // Derive a darker accent for hover states
    const hex = t.accent.replace('#', '');
    const darken = (h, f) => Math.max(0, Math.round(parseInt(h, 16) * f)).toString(16).padStart(2, '0');
    root.setProperty('--accent-hover', '#' + darken(hex.slice(0,2), 0.8) + darken(hex.slice(2,4), 0.8) + darken(hex.slice(4,6), 0.8));
    root.setProperty('--muted', t.muted);
    root.setProperty('--border', t.border);
    root.setProperty('--surface', t.surface);
    root.setProperty('--card-bg', t.cardBackground);
})();

// Fixed adoption levels — only colors are customizable via data
const LEVELS = [
    { value: 0, label: 'N/A',         key: 'na',          hint: 'Practice does not apply to this team',                          ...DATA.adoptionLevels.na },
    { value: 1, label: 'Aware',       key: 'aware',       hint: 'Practice is known but not yet adopted',                         ...DATA.adoptionLevels.aware },
    { value: 2, label: 'Emergent',    key: 'emergent',    hint: 'Practice is being adopted, usage is growing',                   ...DATA.adoptionLevels.emergent },
    { value: 3, label: 'Intentional', key: 'intentional', hint: 'Practice is deliberately and consistently applied',             ...DATA.adoptionLevels.intentional }
];

// Generate dynamic score CSS classes
(function generateScoreStyles() {
    const style = document.createElement('style');
    style.textContent = LEVELS.map(l =>
        `.s${l.value} { background: ${l.color}; color: ${l.textColor}; }`
    ).join('\n');
    document.head.appendChild(style);
})();

// Build adoption level lookup
const levelByValue = {};
LEVELS.forEach(l => { levelByValue[l.value] = l; });

// Set title, subtitle, logo
document.getElementById('main-title').textContent = DATA.title;
document.getElementById('main-subtitle').textContent = DATA.subtitle;
document.getElementById('generated-at').textContent = 'Generated at ' + '/** @GENERATED_AT@ */';
if (DATA.logo) {
    document.getElementById('logo-container').innerHTML =
        `<img src="${DATA.logo}" alt="Logo" class="logo-img">`;
}

const teams = DATA.teams;
const sections = DATA.sections;

// Global counters
const totalCells = {};
LEVELS.forEach(l => { totalCells[l.value] = 0; });

sections.forEach(section => {
    section.practices.forEach(p => {
        p.levels.forEach(s => { totalCells[s]++; });
    });
});

// Stats
const sortedLevels = LEVELS.slice().sort((a, b) => b.value - a.value);
const applicable = sortedLevels
    .filter(l => l.value > 0)
    .reduce((sum, l) => sum + totalCells[l.value], 0);

const maxLevel = Math.max(...LEVELS.map(l => l.value));

const statsDiv = document.getElementById('stats');
statsDiv.innerHTML = sortedLevels.map(l =>
    `<div class="stat-card"><div class="stat-value" style="color:${l.color === '#EEEBE6' || l.color === '#D4C9B8' ? l.textColor : l.color}">${totalCells[l.value]}</div><div class="stat-label">${l.label} <span class="info-icon">?<span class="info-tooltip">${l.hint}</span></span></div></div>`
).join('') + `<div class="stat-card"><div class="stat-value" style="color:${DATA.theme.accent}">${applicable > 0 ? (sortedLevels.filter(l => l.value >= 2).reduce((sum, l) => sum + totalCells[l.value], 0) / applicable * 100).toFixed(0) : 0}%</div><div class="stat-label">Adoption Rate <span class="info-icon">?<span class="info-tooltip">% of practices at least started (N/A excluded)</span></span></div></div>`;

// Team stats
const teamStats = teams.map((team, ti) => {
    const counts = {};
    LEVELS.forEach(l => { counts[l.value] = 0; });
    sections.forEach(section => {
        section.practices.forEach(p => {
            counts[p.levels[ti]]++;
        });
    });
    const total = Object.values(counts).reduce((sum, c) => sum + c, 0);
    const app = Object.entries(counts)
        .filter(([v]) => parseInt(v) > 0)
        .reduce((sum, [, c]) => sum + c, 0);
    return { team, counts, total, applicable: app };
});

// Team Radars
const teamRadarsDiv = document.getElementById('team-radars');
const quadColors = DATA.theme.quadrantColors;
const ringNames = sortedLevels.map(l => l.label);
const ringFills = [
    'rgba(74,124,89,0.10)', 'rgba(196,149,106,0.08)',
    'rgba(212,201,184,0.08)', 'rgba(238,235,230,0.06)'
];

function buildRadar(container, teamIdx) {
    const size = 750;
    const cx = size / 2, cy = size / 2;
    const maxR = size / 2 - 45;
    const numRings = LEVELS.length;
    const ringR = [];
    for (let i = 0; i < numRings; i++) {
        ringR.push(maxR * (0.52 + (i / (numRings - 1)) * 0.44));
    }
    const quadCount = sections.length;
    const dotR = 8;

    const svg = d3.select(container).append('svg')
        .attr('width', '100%').attr('height', size)
        .attr('viewBox', `0 0 ${size} ${size}`);

    // Rings (outer to inner)
    for (let ri = numRings - 1; ri >= 0; ri--) {
        svg.append('circle').attr('cx', cx).attr('cy', cy).attr('r', ringR[ri])
            .attr('fill', ringFills[ri] || 'rgba(200,200,200,0.05)')
            .attr('stroke', DATA.theme.border).attr('stroke-width', 0.5);
    }

    // Quadrant lines
    for (let qi = 0; qi < quadCount; qi++) {
        const angle = (qi / quadCount) * Math.PI * 2 - Math.PI / 2;
        svg.append('line').attr('x1', cx).attr('y1', cy)
            .attr('x2', cx + Math.cos(angle) * ringR[numRings - 1])
            .attr('y2', cy + Math.sin(angle) * ringR[numRings - 1])
            .attr('stroke', DATA.theme.border).attr('stroke-width', 0.5);
    }

    // Ring labels
    ringNames.forEach((name, ri) => {
        const angle = -Math.PI / 2 + 0.06;
        svg.append('text')
            .attr('x', cx + Math.cos(angle) * (ringR[ri] - 10))
            .attr('y', cy + Math.sin(angle) * (ringR[ri] - 10))
            .attr('font-size', 8).attr('fill', DATA.theme.muted).attr('opacity', 0.5)
            .attr('font-family', 'Inter,sans-serif').attr('font-weight', 500)
            .attr('text-anchor', 'start').attr('dominant-baseline', 'middle')
            .text(name);
    });

    // Quadrant labels
    sections.forEach((section, qi) => {
        const midAngle = ((qi + 0.5) / quadCount) * Math.PI * 2 - Math.PI / 2;
        const labelR = ringR[numRings - 1] + 22;
        svg.append('text')
            .attr('x', cx + Math.cos(midAngle) * labelR)
            .attr('y', cy + Math.sin(midAngle) * labelR)
            .attr('font-size', 10).attr('fill', quadColors[qi % quadColors.length])
            .attr('font-family', 'Inter,sans-serif').attr('font-weight', 700)
            .attr('text-anchor', 'middle').attr('dominant-baseline', 'middle')
            .attr('letter-spacing', '0.04em')
            .text(section.title.toUpperCase());
    });

    // Collect dots
    const dots = [];
    const legend = [];
    let globalIdx = 1;

    sections.forEach((section, qi) => {
        const quadLegend = { title: section.title, color: quadColors[qi % quadColors.length], items: [] };
        const angleStart = (qi / quadCount) * Math.PI * 2 - Math.PI / 2;
        const angleEnd = ((qi + 1) / quadCount) * Math.PI * 2 - Math.PI / 2;
        const pad = 0.08;

        // Group practices by ring for this team
        const byRing = {};
        LEVELS.forEach(l => { byRing[l.value] = []; });
        section.practices.forEach(p => {
            byRing[p.levels[teamIdx]].push(p.name);
        });

        // Place dots ring by ring
        sortedLevels.forEach((level, li) => {
            const score = level.value;
            const ringIdx = li;
            const innerR = ringIdx === 0 ? dotR * 2 : ringR[ringIdx - 1] + dotR;
            const outerR = ringR[ringIdx] - dotR;
            const practices = byRing[score];
            if (practices.length === 0) return;

            practices.forEach((name, pi) => {
                const t = (pi + 0.5) / practices.length;
                const angle = angleStart + pad + t * (angleEnd - angleStart - pad * 2);
                const rFrac = practices.length <= 2 ? 0.5 : (pi % 3) / 2.5 * 0.6 + 0.2;
                const r = innerR + (outerR - innerR) * rFrac;

                const num = globalIdx++;
                dots.push({
                    x: cx + Math.cos(angle) * r,
                    y: cy + Math.sin(angle) * r,
                    color: quadColors[qi % quadColors.length],
                    num, name, score, qi, ringIdx,
                    inactive: score === 0
                });
                quadLegend.items.push({ num, name, score });
            });
        });
        legend.push(quadLegend);
    });

    // d3-force collision resolution
    const simulation = d3.forceSimulation(dots)
        .force('collision', d3.forceCollide(dotR + 2))
        .force('x', d3.forceX(d => d.x).strength(0.7))
        .force('y', d3.forceY(d => d.y).strength(0.7))
        .stop();

    for (let i = 0; i < 200; i++) simulation.tick();

    // Clamp dots
    const clampPad = 0.06;
    function clampDots() {
        dots.forEach(d => {
            const dx = d.x - cx, dy = d.y - cy;
            let dist = Math.sqrt(dx * dx + dy * dy);
            let angle = Math.atan2(dy, dx);

            const qStart = (d.qi / quadCount) * Math.PI * 2 - Math.PI / 2 + clampPad;
            const qEnd = ((d.qi + 1) / quadCount) * Math.PI * 2 - Math.PI / 2 - clampPad;

            while (angle < qStart - Math.PI) angle += Math.PI * 2;
            while (angle > qStart + Math.PI) angle -= Math.PI * 2;

            if (angle < qStart) angle = qStart;
            if (angle > qEnd) angle = qEnd;

            const ri = d.ringIdx;
            const minR = ri === 0 ? dotR + 2 : ringR[ri - 1] + dotR + 1;
            const maxRing = ringR[ri] - dotR - 1;
            if (dist < minR) dist = minR;
            if (dist > maxRing) dist = maxRing;

            d.x = cx + Math.cos(angle) * dist;
            d.y = cy + Math.sin(angle) * dist;
        });
    }

    clampDots();

    // Second pass
    const sim2 = d3.forceSimulation(dots)
        .force('collision', d3.forceCollide(dotR + 1.5))
        .force('x', d3.forceX(d => d.x).strength(0.9))
        .force('y', d3.forceY(d => d.y).strength(0.9))
        .stop();
    for (let i = 0; i < 100; i++) sim2.tick();

    clampDots();

    // Tooltip
    const tooltip = d3.select(container).append('div')
        .style('position', 'absolute').style('pointer-events', 'none')
        .style('background', DATA.theme.heading).style('color', '#fff')
        .style('padding', '4px 8px').style('border-radius', '3px')
        .style('font-size', '11px').style('font-family', 'Inter,sans-serif')
        .style('opacity', 0).style('white-space', 'nowrap').style('z-index', 10);

    // Render dots
    const groups = svg.selectAll('.dot').data(dots).enter().append('g')
        .style('cursor', 'pointer')
        .on('mouseover', (e, d) => {
            tooltip.style('opacity', 1).text(`${d.num}. ${d.name}`);
            const rect = container.getBoundingClientRect();
            tooltip.style('left', (e.clientX - rect.left + 10) + 'px')
                   .style('top', (e.clientY - rect.top - 20) + 'px');
        })
        .on('mouseout', () => tooltip.style('opacity', 0));

    groups.append('circle')
        .attr('cx', d => d.x).attr('cy', d => d.y).attr('r', dotR)
        .attr('fill', d => d.color).attr('opacity', d => d.inactive ? 0.25 : 0.9)
        .attr('stroke', '#fff').attr('stroke-width', 1.5);

    groups.append('text')
        .attr('x', d => d.x).attr('y', d => d.y + 0.5)
        .attr('font-size', 7).attr('fill', '#fff')
        .attr('font-family', 'Inter,sans-serif').attr('font-weight', 600)
        .attr('text-anchor', 'middle').attr('dominant-baseline', 'middle')
        .text(d => d.num);

    // Build HTML legend
    const legendDiv = document.createElement('div');
    legendDiv.className = 'radar-legend-grid';

    legend.forEach(q => {
        const col = document.createElement('div');
        col.className = 'radar-legend-col';
        col.innerHTML = `<h4 style="color:${q.color}">${q.title}</h4>`;
        const ul = document.createElement('ul');

        const byRing = {};
        LEVELS.forEach(l => { byRing[l.value] = []; });
        q.items.forEach(item => byRing[item.score].push(item));

        sortedLevels.forEach(level => {
            const score = level.value;
            if (byRing[score].length === 0) return;
            const label = document.createElement('li');
            label.className = 'ring-label';
            label.style.color = level.color === '#EEEBE6' || level.color === '#D4C9B8' ? level.textColor : level.color;
            label.textContent = level.label;
            ul.appendChild(label);

            byRing[score].forEach(item => {
                const li = document.createElement('li');
                li.innerHTML = `<span class="dot-num" style="background:${q.color}; opacity:${item.score === 0 ? 0.3 : 0.9}">${item.num}</span><span>${item.name}</span>`;
                ul.appendChild(li);
            });
        });

        col.appendChild(ul);
        legendDiv.appendChild(col);
    });

    container.appendChild(legendDiv);
}

teams.forEach((team, ti) => {
    const ts = teamStats[ti];

    const details = document.createElement('details');
    let barSegments = '';
    sortedLevels.forEach(l => {
        const count = ts.counts[l.value];
        if (count) {
            const pct = ts.total > 0 ? (count / ts.total * 100) : 0;
            barSegments += `<div class="team-bar-segment" style="width:${pct}%; background:${l.color}; color:${l.textColor}">${count}</div>`;
        }
    });

    details.innerHTML = `
        <summary>
            <div class="layer-header">
                <div class="section-title">${team}</div>
                <div class="layer-bar">
                    <div class="team-bar-track">${barSegments}</div>
                </div>
            </div>
        </summary>
    `;

    const radarContainer = document.createElement('div');
    radarContainer.className = 'radar-wrap';
    radarContainer.style.position = 'relative';
    details.appendChild(radarContainer);

    teamRadarsDiv.appendChild(details);

    let radarBuilt = false;
    details.addEventListener('toggle', () => {
        if (details.open && !radarBuilt) {
            radarBuilt = true;
            buildRadar(radarContainer, ti);
        }
    });
});

// Practices by Layer
const layersDiv = document.getElementById('layers');

sections.forEach((section, si) => {
    let secCounts = {};
    LEVELS.forEach(l => { secCounts[l.value] = 0; });
    section.practices.forEach(p => {
        p.levels.forEach(s => { secCounts[s]++; });
    });
    const secTotal = Object.values(secCounts).reduce((sum, c) => sum + c, 0);

    let barSegments = '';
    sortedLevels.forEach(l => {
        const count = secCounts[l.value];
        if (count) {
            const pct = secTotal > 0 ? (count / secTotal * 100) : 0;
            barSegments += `<div class="team-bar-segment" style="width:${pct}%; background:${l.color}; color:${l.textColor}">${count}</div>`;
        }
    });

    let tableHTML = `<table><thead><tr><th>Practice</th>`;
    teams.forEach(t => tableHTML += `<th>${t}</th>`);
    tableHTML += `</tr></thead><tbody>`;

    section.practices.forEach(p => {
        const label = p.link ? `<a href="${p.link}" target="_blank" rel="noopener" style="color:var(--text); text-decoration:none; border-bottom:1px solid var(--border);">${p.name}</a>` : p.name;
        tableHTML += `<tr><td>${label}</td>`;
        p.levels.forEach(s => {
            const cellLabel = s === 0 ? '—' : '';
            tableHTML += `<td class="s${s}">${cellLabel}</td>`;
        });
        tableHTML += `</tr>`;
    });
    tableHTML += `</tbody></table>`;

    const details = document.createElement('details');
    details.innerHTML = `
        <summary>
            <div class="layer-header">
                <div class="section-title">${section.title}</div>
                <div class="layer-bar">
                    <div class="team-bar-track">${barSegments}</div>
                </div>
            </div>
        </summary>
        <div class="table-container">${tableHTML}</div>
    `;

    layersDiv.appendChild(details);
});

// Notes section
if (DATA.notes && DATA.notes.length > 0) {
    let notesHTML = '<h2 class="section-heading">Notes</h2>';
    notesHTML += '<div style="font-size:0.85rem; line-height:1.7; color:#6B5B52;">';
    DATA.notes.forEach(note => {
        notesHTML += `<p>${note.text}</p>`;
        if (note.items && note.items.length > 0) {
            notesHTML += '<ul style="margin:0.6rem 0 0 1.2rem; padding:0;">';
            note.items.forEach(item => {
                if (item.link) {
                    notesHTML += `<li><a href="${item.link}" target="_blank" rel="noopener" style="color:var(--accent); text-decoration:none; border-bottom:1px solid var(--accent);">${item.name}</a></li>`;
                } else {
                    notesHTML += `<li>${item.name}</li>`;
                }
            });
            notesHTML += '</ul>';
        }
    });
    notesHTML += '</div>';
    document.querySelector('.container').insertAdjacentHTML('beforeend', notesHTML);
}

</script>
